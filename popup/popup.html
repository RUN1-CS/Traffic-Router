<html>
  <body>
    <h1>Traffic Router</h1>
    <p>Redirects traffic from one domain to another.</p>
    <form id="settings-form">
      <table>
        <tr>
          <label for="old-domain">Old Domain:</label>
          <input type="text" id="old-domain" name="oldDomain" />
        </tr>
        <tr>
          <label for="new-domain">New Domain:</label>
          <input type="text" id="new-domain" name="newDomain" />
        </tr>
        <tr>
          <td colspan="2"><button type="submit">Save Settings</button></td>
        </tr>
      </table>
    </form>
    <script src="popup.js"></script>
  </body>
</html>
